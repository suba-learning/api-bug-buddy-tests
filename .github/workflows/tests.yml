name: Run API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_FIRST_NAME: ${{ secrets.TEST_FIRST_NAME }}
      TEST_LAST_NAME: ${{ secrets.TEST_LAST_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check secrets are set
        run: |
          echo "BASE_URL is set: ${{ secrets.BASE_URL != '' }}"
          echo "TEST_USER_EMAIL is set: ${{ secrets.TEST_USER_EMAIL != '' }}"
          echo "TEST_USER_PASSWORD is set: ${{ secrets.TEST_USER_PASSWORD != '' }}"
          echo "TEST_FIRST_NAME is set: ${{ secrets.TEST_FIRST_NAME != '' }}"
          echo "TEST_LAST_NAME is set: ${{ secrets.TEST_LAST_NAME != '' }}"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
